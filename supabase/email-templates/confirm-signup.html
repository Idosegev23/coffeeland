<!DOCTYPE html>
<html dir="rtl" lang="he">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width"></head>
<body style="margin:0;padding:0;background-color:#E8DED1;font-family:Heebo,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#E8DED1;padding:40px 20px;">
<tr><td align="center">
<table width="500" cellpadding="0" cellspacing="0" style="background-color:#F9F7F3;border-radius:24px 24px 24px 0;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
  <!-- Header -->
  <tr><td style="background-color:#4C2C21;padding:30px;text-align:center;">
    <img src="https://www.coffelandclub.co.il/logo.svg" alt="CoffeeLand" width="80" height="80" style="margin-bottom:10px;">
    <h1 style="color:#F9F7F3;margin:0;font-size:22px;">CoffeeLand</h1>
  </td></tr>
  <!-- Body -->
  <tr><td style="padding:40px 30px;text-align:center;">
    <h2 style="color:#4C2C21;margin:0 0 15px;font-size:24px;">ברוכים הבאים!</h2>
    <p style="color:#4C2C21;font-size:16px;line-height:1.6;margin:0 0 30px;">
      תודה שנרשמתם ל-CoffeeLand!<br>לחצו על הכפתור כדי לאשר את החשבון שלכם:
    </p>
    <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=signup&next=/my-account"
       style="display:inline-block;background-color:#5F614C;color:#F9F7F3;text-decoration:none;padding:14px 40px;border-radius:16px 16px 16px 0;font-size:16px;font-weight:bold;">
      אישור חשבון
    </a>
    <p style="color:#8D5A40;font-size:13px;margin:25px 0 0;line-height:1.5;">
      מחכים לראות אתכם במשחקייה!
    </p>
  </td></tr>
  <!-- Footer -->
  <tr><td style="background-color:#4C2C21;padding:20px 30px;text-align:center;">
    <p style="color:#F9F7F3;opacity:0.7;font-size:12px;margin:0;">
      CoffeeLand - משחקייה, קפה וסדנאות למשפחות
    </p>
  </td></tr>
</table>
</td></tr>
</table>
</body>
</html>
